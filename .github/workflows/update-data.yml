name: Update VN Market Data (End of Day)

on:
  schedule:
    - cron: '30 8 * * 1-5'   # 15:30 giờ VN = 08:30 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Fetch VN market data
        run: |
          python3 - << 'EOF'
          import json, datetime, requests, time

          H = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64)",
              "Accept": "application/json",
              "Referer": "https://tcinvest.tcbs.com.vn/",
          }

          def sf(v, d=0.0):
              try: return float(v) if v is not None else d
              except: return d
          def si(v, d=0):
              try: return int(v) if v is not None else d
              except: return d

          NAME_MAP = {
              "Banks":"Ngân hàng","Financial Services":"Tài chính",
              "Real Estate":"Bất động sản","Materials":"Nguyên vật liệu",
              "Industrials":"Công nghiệp","Consumer Discretionary":"Tiêu dùng tùy ý",
              "Consumer Staples":"Tiêu dùng thiết yếu","Technology":"Công nghệ",
              "Energy":"Năng lượng","Utilities":"Tiện ích",
              "Health Care":"Y tế","Telecommunication":"Viễn thông",
              "Insurance":"Bảo hiểm","Securities":"Chứng khoán",
              "BANK":"Ngân hàng","FINANCIAL":"Tài chính",
              "REALESTATE":"Bất động sản","MATERIAL":"Nguyên vật liệu",
              "INDUSTRIAL":"Công nghiệp","CONSUMER":"Tiêu dùng",
              "TECH":"Công nghệ","ENERGY":"Năng lượng",
              "UTILITY":"Tiện ích","HEALTH":"Y tế",
          }

          def fetch_vn():
              url = "https://finfo-api.vndirect.com.vn/v4/stock-prices?code=VNINDEX,VN30,VNMIDCAP&sort=date:desc&size=3"
              try:
                  r = requests.get(url, headers=H, timeout=15)
                  r.raise_for_status()
                  result = {}
                  for row in r.json().get("data", []):
                      code = (row.get("code") or "").strip().upper()
                      if code not in ["VNINDEX","VN30","VNMIDCAP"]: continue
                      close = sf(row.get("close"))
                      if close < 100: close = sf(row.get("adClose"))
                      if close < 100: close = sf(row.get("referencePrice"))
                      raw_pct = sf(row.get("pctChange"))
                      pct = raw_pct * 100 if (raw_pct != 0 and abs(raw_pct) < 0.1) else raw_pct
                      result[code] = {
                          "value": round(close, 2), "change": round(sf(row.get("change")), 2),
                          "pct": round(pct, 2),
                          "vol": round(sf(row.get("nmVolume")) / 1e6, 2),
                          "val": int(sf(row.get("nmValue")) / 1e9),
                      }
                      print(f"  {code}: {close:.2f} ({pct:+.2f}%)")
                  return result
              except Exception as e:
                  print(f"  [ERROR] VN: {e}")
                  return {}

          def fetch_foreign():
              sources = [
                  ("https://iboard-query.ssi.com.vn/v2/stock/foreignTrading/all?exchangeCode=HOSE",
                   {**H, "Referer": "https://iboard.ssi.com.vn/"}),
                  ("https://finfo-api.vndirect.com.vn/v4/vnmarket/foreign?sort=date:desc&size=1", H),
              ]
              for url, h in sources:
                  try:
                      r = requests.get(url, headers=h, timeout=15)
                      r.raise_for_status()
                      d = r.json()
                      raw = d.get("data")
                      item = raw if isinstance(raw, dict) else (raw[0] if isinstance(raw, list) and raw else None)
                      if not item: continue
                      buy  = sf(item.get("buyVal") or item.get("buyValue") or item.get("totalBuyValue"))
                      sell = sf(item.get("sellVal") or item.get("sellValue") or item.get("totalSellValue"))
                      net  = sf(item.get("netVal") or item.get("netValue")) or (buy - sell)
                      if abs(buy) > 1e9: buy/=1e9; sell/=1e9; net/=1e9
                      elif abs(buy) > 1e6: buy/=1e3; sell/=1e3; net/=1e3
                      print(f"  Foreign net: {net:.0f} ty")
                      return {"net": round(net), "buy": round(buy), "sell": round(sell)}
                  except Exception as e:
                      print(f"  [WARN] Foreign {url[:50]}: {e}")
              return None

          def fetch_breadth():
              try:
                  r = requests.get("https://apipubaws.tcbs.com.vn/stock-insight/v1/index/snapshot", headers=H, timeout=15)
                  r.raise_for_status()
                  items = r.json() if isinstance(r.json(), list) else r.json().get("data", [])
                  for item in items:
                      if (item.get("indexId") or item.get("comGroupCode") or "").upper() == "VNINDEX":
                          b = {"up":si(item.get("advances")), "nt":si(item.get("noChange")),
                               "dn":si(item.get("declines")), "ceil":si(item.get("ceiling")), "floor":si(item.get("floor"))}
                          print(f"  Breadth: up={b['up']} dn={b['dn']} ceil={b['ceil']} floor={b['floor']}")
                          return b
              except Exception as e:
                  print(f"  [WARN] Breadth: {e}")
              return {"up":0,"nt":0,"dn":0,"ceil":0,"floor":0}

          def fetch_industry():
              def normalize(items_raw, name_key, pct_key, up_key=None, dn_key=None):
                  result = []
                  for item in items_raw:
                      name_raw = item.get(name_key) or ""
                      name_vn  = NAME_MAP.get(name_raw, name_raw)
                      pct = sf(item.get(pct_key) or 0)
                      if abs(pct) < 0.1 and pct != 0: pct = pct * 100
                      if name_vn:
                          result.append({"name": name_vn, "pct": round(pct, 2),
                                         "up": si(item.get(up_key) if up_key else 0),
                                         "dn": si(item.get(dn_key) if dn_key else 0)})
                  return sorted(result, key=lambda x: x["pct"], reverse=True)

              try:
                  r = requests.get("https://apipubaws.tcbs.com.vn/stock-insight/v1/industry/snapshot", headers=H, timeout=15)
                  r.raise_for_status()
                  raw = r.json()
                  items = raw if isinstance(raw, list) else raw.get("data", [])
                  for key in ["dayChangePercent","changePercent","pctChange","change","performance"]:
                      if items and items[0].get(key) is not None:
                          for nk in ["industry","industryName","name"]:
                              result = normalize(items, nk, key, "advances", "declines")
                              if result:
                                  print(f"  Industry (TCBS/{key}): {len(result)} nganh")
                                  return result
              except Exception as e:
                  print(f"  [WARN] TCBS industry: {e}")

              for period in ["D","1D","day"]:
                  try:
                      r = requests.get(f"https://apipubaws.tcbs.com.vn/stock-insight/v1/industry/performance?period={period}", headers=H, timeout=15)
                      r.raise_for_status()
                      raw = r.json()
                      items = raw if isinstance(raw, list) else raw.get("data", [])
                      if not items: continue
                      for key in ["performance","pct","change","dayChangePercent"]:
                          for nk in ["industry","name"]:
                              result = normalize(items, nk, key)
                              if result:
                                  print(f"  Industry (TCBS perf/{period}): {len(result)} nganh")
                                  return result
                  except: pass

              try:
                  r = requests.get("https://finfo-api.vndirect.com.vn/v4/industryStatistics?sort=date:desc&size=20", headers=H, timeout=15)
                  r.raise_for_status()
                  rows = r.json().get("data", [])
                  seen = set()
                  result = []
                  for row in rows:
                      name_vn = NAME_MAP.get(row.get("industry") or row.get("industryCode") or "", "")
                      if not name_vn or name_vn in seen: continue
                      seen.add(name_vn)
                      pct = sf(row.get("pctChange") or row.get("change") or 0)
                      if abs(pct) < 0.1 and pct != 0: pct *= 100
                      result.append({"name": name_vn, "pct": round(pct,2), "up":0, "dn":0})
                  result.sort(key=lambda x: x["pct"], reverse=True)
                  if result:
                      print(f"  Industry (VNDirect): {len(result)} nganh")
                      return result
              except Exception as e:
                  print(f"  [WARN] VNDirect industry: {e}")

              print("  [ERROR] Industry: all fail")
              return None

          # === MAIN ===
          tz7 = datetime.timezone(datetime.timedelta(hours=7))
          now = datetime.datetime.now(tz7)
          updated = now.strftime("%d/%m/%Y %H:%M")
          print(f"Bat dau: {updated}")

          try:
              with open("data.json","r",encoding="utf-8") as f: old = json.load(f)
          except: old = {}

          print("Fetching VN indices...")
          vn = fetch_vn()
          time.sleep(1)
          print("Fetching khoi ngoai...")
          fgn = fetch_foreign()
          time.sleep(1)
          print("Fetching breadth...")
          breadth = fetch_breadth()
          time.sleep(1)
          print("Fetching industry...")
          industry = fetch_industry()

          vni  = vn.get("VNINDEX")  or old.get("vni",  {})
          vn30 = vn.get("VN30")     or old.get("vn30", {})
          vnm  = vn.get("VNMIDCAP") or old.get("vnmid",{})
          if isinstance(vni, dict) and breadth: vni.update(breadth)

          old_fgn = old.get("foreign", {})
          if fgn and fgn.get("net") not in [None, 0]:
              fgn_final = fgn
          elif old_fgn.get("net") not in [None, 0, -240, 1480]:
              fgn_final = old_fgn
          else:
              fgn_final = {"net": None, "buy": None, "sell": None}

          industry_final = industry if industry else old.get("industry", [])

          data = {
              "updated": updated, "vni": vni, "vn30": vn30, "vnmid": vnm,
              "foreign": fgn_final, "industry": industry_final,
          }
          with open("data.json","w",encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"\nXong! {updated}")
          print(f"VNINDEX: {vni.get('value')} ({vni.get('pct'):+.2f}%) | up={vni.get('up')} dn={vni.get('dn')}")
          print(f"VN30: {vn30.get('value')} | VNMIDCAP: {vnm.get('value')}")
          print(f"Foreign: {fgn_final}")
          print(f"Industry: {len(industry_final)} nganh")

          # Lưu snapshot để dùng cho bước generate nhận định
          with open("_market_snapshot.json","w",encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)
          EOF

      # ──────────────────────────────────────────────────────────────
      # BƯỚC TỰ ĐỘNG SINH NHẬN ĐỊNH — CHỈ CHẠY KHI CÓ API KEY
      # Nếu chưa có ANTHROPIC_API_KEY → bỏ qua, không báo lỗi
      # Khi muốn bật: Thêm ANTHROPIC_API_KEY vào GitHub Secrets là xong
      # ──────────────────────────────────────────────────────────────
      - name: Generate Broker's Take (auto - requires ANTHROPIC_API_KEY)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 - << 'EOF'
          import json, os, datetime, requests

          api_key = os.environ.get("ANTHROPIC_API_KEY", "")

          # Không có key → bỏ qua hoàn toàn, không lỗi
          if not api_key or api_key.strip() == "":
              print("  [SKIP] Chưa có ANTHROPIC_API_KEY — bỏ qua auto-generate")
              print("  [INFO] Để bật tự động: thêm ANTHROPIC_API_KEY vào GitHub Secrets")
              exit(0)

          print("  [AUTO] Đang generate Broker's Take với Claude API...")

          try:
              with open("_market_snapshot.json","r",encoding="utf-8") as f:
                  data = json.load(f)
          except Exception as e:
              print(f"  [ERROR] Không đọc được snapshot: {e}")
              exit(0)

          tz7 = datetime.timezone(datetime.timedelta(hours=7))
          today = datetime.datetime.now(tz7).strftime("%d/%m/%Y")

          # Build prompt với đầy đủ context
          prompt = f"""Bạn là broker chứng khoán Việt Nam 3 năm kinh nghiệm. Viết nhận định cuối ngày cho web dashboard cá nhân. Người đọc cần thông tin nhanh, gọn, đủ để ra quyết định ngay.

NGUYÊN TẮC:
- Câu đầu PHẢI là kết luận, không phải mô tả
- Quan điểm rõ ràng, không nước đôi
- Ngôn ngữ như nói chuyện với người đang học đầu tư
- Không dùng tin đồn/nội gián làm căn cứ
- Ưu tiên: Vĩ mô > Ngành > Kỹ thuật > Tâm lý
- Breadth quan trọng hơn điểm số (xanh vỏ đỏ lòng)
- Tháng BCTC (4/7/10): cẩn trọng, nhiều nhiễu

DỮ LIỆU NGÀY {today}:
{json.dumps(data, ensure_ascii=False, indent=2)}

Trả về JSON sau (KHÔNG viết gì ngoài JSON):
{{
  "date": "{today}",
  "verdict": {{
    "signal": "TÍCH CỰC | THẬN TRỌNG | TIÊU CỰC",
    "emoji": "🟢 | 🟡 | 🔴",
    "headline": "Tối đa 15 chữ - kết luận ngắn",
    "summary": "Tối đa 40 chữ - bổ sung headline"
  }},
  "market_pulse": {{
    "vnindex": "1 câu nhận định VNINDEX (≤20 chữ)",
    "breadth": "1 câu độ rộng thị trường (≤20 chữ)",
    "foreign": "1 câu khối ngoại (≤20 chữ)",
    "liquidity": "1 câu thanh khoản (≤20 chữ)"
  }},
  "sector_highlight": {{
    "leader": "Ngành dẫn dắt",
    "laggard": "Ngành yếu nhất",
    "rotation": "1 câu xu hướng dòng tiền ngành (≤25 chữ)"
  }},
  "world_impact": "1-2 câu tác động thế giới lên VN ngày mai (≤40 chữ)",
  "key_risk": "Rủi ro quan trọng nhất cần theo dõi (≤25 chữ)",
  "action": {{
    "for_holder": "1 câu cho người đang nắm CP (≤20 chữ)",
    "for_watcher": "1 câu cho người chờ vào lệnh (≤20 chữ)"
  }},
  "brokers_take": [
    "Gạch 1: kết luận chính về thị trường",
    "Gạch 2: nhận định ngành/dòng tiền",
    "Gạch 3: khối ngoại và tác động",
    "Gạch 4: cổ phiếu/ngành đáng chú ý nếu có tín hiệu",
    "Gạch 5: hành động cụ thể cho ngày mai"
  ],
  "generated_by": "auto",
  "model": "claude-haiku-3-5"
}}"""

          # Gọi Claude API — dùng Haiku (rẻ nhất, ~$0.0005/ngày)
          try:
              resp = requests.post(
                  "https://api.anthropic.com/v1/messages",
                  headers={
                      "x-api-key": api_key,
                      "anthropic-version": "2023-06-01",
                      "content-type": "application/json",
                  },
                  json={
                      "model": "claude-haiku-4-5",
                      "max_tokens": 1200,
                      "messages": [{"role": "user", "content": prompt}]
                  },
                  timeout=30
              )
              resp.raise_for_status()
              content = resp.json()["content"][0]["text"].strip()

              # Parse JSON từ response
              if content.startswith("```"):
                  content = content.split("```")[1]
                  if content.startswith("json"): content = content[4:]
              result = json.loads(content.strip())

              with open("broker-take.json","w",encoding="utf-8") as f:
                  json.dump(result, f, ensure_ascii=False, indent=2)

              print(f"  [AUTO] OK: {result['verdict']['emoji']} {result['verdict']['headline']}")

          except Exception as e:
              print(f"  [ERROR] API call failed: {e}")
              print("  [INFO] broker-take.json giữ nguyên nội dung cũ")
          EOF

      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json broker-take.json
          git diff --staged --quiet || git commit -m "auto: update market data + broker take $(date +'%H:%M %d/%m/%Y')"
          git push
