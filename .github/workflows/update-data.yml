name: Update VN Market Data (End of Day)

on:
  schedule:
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests

      - name: Fetch VN market data
        run: python3 fetch_data.py

      - name: Generate Broker Take (auto - needs ANTHROPIC_API_KEY)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 gen_broker_take.py

      - name: Commit files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json broker-take.json
          git diff --staged --quiet || git commit -m "auto: update market data $(date +'%H:%M %d/%m/%Y')"
          git push
